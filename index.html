<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Apex Speed Run - Global Parkour Leaderboards and Course Directory">
    <meta property="og:title" content="Apex Speed Run">
    <meta property="og:description" content="Global Parkour Leaderboards and Course Directory">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/asr.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Apex Speed Run">
    <meta name="twitter:description" content="Global Parkour Leaderboards and Course Directory">
    <meta name="twitter:image" content="/asr.png">
    <title>Apex Speed Run</title>

    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/asr.png">
    
    <!-- Theme color adapts to system default -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc">

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://basemaps.cartocdn.com">

    <!-- Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </noscript>
    
    <style>
        /* Premium Loading State Styling */
        #root:empty {
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }
        
        #root:empty::before {
            content: "SCANNING LIVE STATS";
            color: #2563eb;
            font-weight: 900;
            letter-spacing: 0.4em;
            font-size: 12px;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            text-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }
        
        @keyframes pulse { 
            0%, 100% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.5; transform: scale(0.98); } 
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
